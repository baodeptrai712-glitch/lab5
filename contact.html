<!DOCTYPE html>
<html lang="en">
<head>

<body>
     <header class="mb-53">

        <div class="flex-container mb-15 align-item-center">

        </div>
        <nav>

    <section class="mb-100">
        <form action="" method="get" class="flex-container flex-direction-column user-information align-item-center gap-15">
        <div class="flex-container">

            <label for="name">Your name:</label>

        <div class="flex-container flex-direction-column gap-10">
            <input type="text" name="" id="name">
            <input type="email" name="" id="email">
             <input type="text" name="" id="message" class="message">

        </div>
